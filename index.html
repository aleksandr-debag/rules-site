<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Helper - ExperienceRust</title>
    <link rel="icon" type="image/jpeg" href="https://cdn.easydonate.ru/images/logos/6f/94/6f9443acb9219a23d536749cd266d0e4f77512ebc76d6cbf82438840befbd25e.jpg">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <header>
        <img src="https://cdn.easydonate.ru/images/logos/6f/94/6f9443acb9219a23d536749cd266d0e4f77512ebc76d6cbf82438840befbd25e.jpg" alt="Logo">
        <h1>ExperienceRust</h1>
        <p style="color: var(--text-dim)">Помощник по правилам</p>
    </header>

    <div class="search-box">
        <input type="text" id="search-input" placeholder="Найти правило (чит, бан, 3.2)..." autofocus>
    </div>
    
    <div id="rules-container"></div>
    <div id="no-results" class="no-results hidden">Ничего не найдено</div>
</div>

<footer>
    <a href="https://discord.gg/29Kphas8rN" target="_blank" class="discord-btn">
        Наш Discord
    </a>
    <p style="margin-top: 15px; font-size: 0.8em; color: var(--text-dim)">&copy; 2026 ExperienceRust. Все права защищены.</p>
</footer>

<script>
    const rawRules = `
1.1 Пройдя регистрацию на нашем проекте, Вы автоматически соглашаетесь со всеми его правилами и условиями, предоставляемые проектом.
1.2 Незнание правил проекта не освобождает Вас от ответственности.
1.3 Оплата счетов, предоставление услуг и пополнение игрового баланса предоставляется только на официальных ресурсах проекта.
1.4 Администрация проекта не несет ответственности за безопасность Вашего аккаунта. Взлом, кража и подобные внештатные ситуации, не являются оправданием в случае нарушении правил проекта.
1.5 Приобретенные донат-услуги, не возвышает Вас в полномочиях над обычными игроками и не освобождают от соблюдения правил проекта.
1.5.1 Любые донат-услуги ( зачисления на счета проекта ) являются добровольными пожертвованиями и средства, пожертвованные на счета проекта, возврату не подлежат.
1.6 Свод правил проекта, распространяется на всех участников, включая персонал проекта.
1.7 Жалобы на нарушения / обжалования наказаний должно быть подано не позднее 96 часов с момента фиксации, после окончания этого периода времени жалобы / обжалования наказаний не рассматриваются.
1.8 Администрация в праве ограничить вам доступ к ресурсу не объяснив причину, если вы нарушили какой либо пункт из правил.
1.9 Свод правил проекта может сменится любой момент времени, даже без предупреждения участников проекта и это их не освобождает от ответственности.

2.1. Запрещено выдавать себя за администратора, модератора, ютубера/медийную личность/партнера или иное официальное лицо проекта.
[Наказание: Блокировка чата от 1 часа до 48 часов]

2.2. Запрещено предлагать действия, ведущие к нежелательному выходу с сервера.
[Наказание: Блокировка чата от 1 часа до 48 часов]

2.3. Запрещено оскорбление любого рода, в сторону пользователей сервера.
[Наказание: Блокировка чата от 1 часа до 48 часов] 

2.4. Запрещено оскорблять или упоминать в негативном контексте родителей и родственников игроков.
[Наказание: Блокировка чата от 2 часов до 96 часов]

2.5. Запрещено использовать в своих сообщениях флуд и спам (повторение одинаковых или схожих сообщений).
[Наказание: Блокировка чата от 1 часа до 24 часов]

2.6. Запрещено обсуждать в чате сексуализированный контент, наркотики, суицид, политические темы, а также темы, связанные с национальной, расовой или религиозной ненавистью.
[Наказание: Блокировка чата от 1 часа до 96 часов]

2.7. Запрещено размещать в чате прямую рекламу других проектов и ресурсов.
[Наказание: Блокировка чата от 1 часа до 60 суток]

2.8. Запрещено провоцировать других игроков на нарушение правил.
[Наказание: Блокировка чата от 1 часа до 48 часов]

2.9. Запрещено оскорблять, унижать или проявлять неуважительное отношение к администрации.
[Наказание: Блокировка чата от 1 часа до 30 суток]

2.10. Запрещено выпрашивать игровые предметы или ресурсы у администратора.
[Наказание: Блокировка чата от 1 часа до 48 часов]

2.11. Запрещено преднамеренно вводить администрацию в заблуждение ложной информацией о работе игры или проекте.
[Наказание: Блокировка чата от 1 часов до 48 часов]

2.12. Запрещен обход мута путём создания твинк-аккаунтов. 
[Наказание: Блокировка твинк/основного аккааунта, на усмотрение администрации и/или повышение времени блокировки чата основного аккаунта]

2.13. Запрещено распространять личную, персональную или иную конфиденциальную информацию о других игроках.
[Наказание: Блокировка чата от 1 часов до 96 часов]

2.14. Запрещено намеренно говорить, писать или распространять ложную, искажённую или вымышленную информацию о проекте ExperienceRust, его разработке, контенте, участниках, планах и/или истории.
[Наказание: Блокировка чата от 1 часов до 120 дней и/или Блокировка аккаунта от 1 дня до 120 дней]

3.1. Запрещено использование распространение и сокрытие игровых недоработок/багов/дюпов или других ошибок позволяющих получить преимущество над другими игроками
[Наказание: Блокировка аккаунта от 1 дня до 30 дней]

3.2. Запрещено использование/хранение/распространение ЗПО (запрещённых программных обеспечений - Читы) которые дают преимущества перед игроками. [Запрещены любые читы относящиеся к игре Minecraft, в том числе и программы для МАКРОСОВ]
[Наказание: Блокировка аккаунта от 1 дня до 60 дней; Снос игровых построек]

3.2.1. Запрещено играть в команде с игроком, который нарушает пункт правил 3.2.
[Наказание: Блокировка аккаунта от 1 дня до 30 дней; Снос игровых построек]

3.3. Запрещено использовать сторонние пакеты ресурсов, а также моды для игры на нашем проекте, которые дают значительное преимущество в игровом процессе.
[Наказание: Блокировка аккаунта от 1 дня до 60 дней; Снос игровых построек]

3.4. Запрещено продавать игровые ресурсы/аккаунты/другие игровые ценности за реальные средства.
[Наказание: Блокировка аккаунта от 1 дня до 365 дней; Снос игровых построек]

3.5. Запрещено строительство построек, содержащих оскорбительный, аморальный, порнографический или иной неприемлемый контент.
[Наказание: Блокировка аккаунта от 1 дня до 15 дней; Снос игровых построек]

3.6. Запрещено объединяться в команду больше установленного лимита игроков в команде на сервере. 
[Наказание: Блокировка аккаунта от 1 дня до 30 дней; Снос игровых построек]

3.6.1. Запрещено создавать альянсы с другими игроками или командами, если в сумме количество участников превышает лимит сервера.
[Наказание: Блокировка аккаунта от 1 дня до 30 дней; Снос игровых построек]

3.6.2. Временная смена игрока в составе команды запрещена, если основной участник продолжает совместную игру и это приводит к обходу лимита сервера.
[Наказание: Блокировка аккаунта от 1 дня до 30 дней; Снос игровых построек]

3.7. Запрещено использование игровых никнеймов схожих с никнеймами администрации, а также в которых есть оскорбительный/непристойный характер.
[Наказание: Блокировка аккаунта навсегда]

3.8. Запрещено использовать игровые скины для ваших персонажей которые дают значительное преимущество в игровом процессе. (Невидимые скины на персонажа)
[Наказание: Блокировка аккаунта от 1 дня до 30 дней; Снос игровых построек]

4.2. Во время проведение проверки модератор в праве запросить установку таких программ как: ShellBag, Everything, AnyDesk, RuDesktop.
4.3. Проверка ПК на наличие ЗПО может осуществляться только лицами со статусом модератора и выше.
[Наказание: Блокировка аккаунта от 1 дня до 120 дней]

4.4. Все взаимодействия с администрацией исключительно происходят в уважительной форме.
[Наказание: Блокировка аккаунта/чата от 1 часа до 120 дней]
`;

    const container = document.getElementById('rules-container');
    const searchInput = document.getElementById('search-input');
    const noResults = document.getElementById('no-results');

    function parseRules(text) {
        const lines = text.split('\n').filter(l => l.trim() !== '');
        const rules = [];
        let current = null;

        lines.forEach(line => {
            const trimmed = line.trim();
            if (/^\d+\.\d+/.test(trimmed)) {
                if (current) rules.push(current);
                const spaceIdx = trimmed.indexOf(' ');
                current = {
                    id: trimmed.substring(0, spaceIdx).replace(/\.$/, ''),
                    content: trimmed.substring(spaceIdx + 1),
                    punish: '',
                    keywords: trimmed.toLowerCase()
                };
            } else if (trimmed.startsWith('[Наказание:')) {
                if (current) {
                    current.punish = trimmed.replace(/[\[\]]/g, '');
                    current.keywords += ' ' + current.punish.toLowerCase();
                }
            } else if (current) {
                current.content += ' ' + trimmed;
                current.keywords += ' ' + trimmed.toLowerCase();
            }
        });
        if (current) rules.push(current);
        return rules;
    }

    const rules = parseRules(rawRules);

    function render(filter = '') {
        container.innerHTML = '';
        let found = false;
        const q = filter.toLowerCase().trim();

        rules.forEach(r => {
            if (r.keywords.includes(q) || q === '') {
                const card = document.createElement('div');
                card.className = 'rule-card';
                card.innerHTML = `
                    <h3>Пункт ${r.id}</h3>
                    <p>${r.content}</p>
                    ${r.punish ? `<div class="punishment">${r.punish}</div>` : ''}
                `;
                container.appendChild(card);
                found = true;
            }
        });
        noResults.classList.toggle('hidden', found);
    }

    searchInput.addEventListener('input', e => render(e.target.value));
    render();
</script>
</body>
</html>
